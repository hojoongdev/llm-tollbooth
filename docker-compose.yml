# All services for LLM Tollbooth run from this one file.
# `docker compose up` brings the whole stack up; each phase adds a service here.
name: llm-tollbooth

services:
  # Event backbone. The gateway publishes one event per LLM call here, and the
  # workers consume it off the request's critical path.
  kafka:
    image: apache/kafka:3.9.0
    container_name: llm-tollbooth-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092" # host tools reach the broker on localhost:9092
    environment:
      # KRaft: this single node is both broker and controller (no ZooKeeper).
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Two client listeners so both in-cluster and host clients get an address
      # that actually resolves from where they sit:
      #   INTERNAL (29092) -> other containers connect via the service name "kafka"
      #   EXTERNAL (9092)  -> tools on the host connect via "localhost"
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Single node: internal topics can only have one replica.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # We create llm.events explicitly (with 6 partitions), so don't let a typo'd
      # topic name silently spawn a 1-partition topic.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # One-shot: waits for the broker, then creates the llm.events topic with 6
  # partitions (so consumers can scale out later) and exits. Safe to re-run.
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: llm-tollbooth-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/opt/kafka/bin/kafka-topics.sh"]
    command: >
      --bootstrap-server kafka:29092
      --create --if-not-exists
      --topic llm.events
      --partitions 6
      --replication-factor 1
    restart: "no"

  # Time-series metrics store. Absorbs the write-heavy stream of per-request rows
  # and hourly rollups; the dashboard reads aggregates back out of here.
  cassandra:
    image: cassandra:5.0
    container_name: llm-tollbooth-cassandra
    ports:
      - "${CASSANDRA_PORT:-9042}:9042" # CQL
    environment:
      CASSANDRA_CLUSTER_NAME: llm-tollbooth
      # Cassandra grabs ~1/4 of host RAM by default. Cap it so it can share a
      # laptop with Kafka + Mongo. (The image requires both vars set together.)
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

  # One-shot: waits for Cassandra, applies the keyspace/schema, then exits. The
  # cassandra image has no init-script hook (unlike mongo), so we apply it here.
  # Mirrors the kafka-init pattern. init.cql is idempotent (IF NOT EXISTS).
  cassandra-init:
    image: cassandra:5.0
    container_name: llm-tollbooth-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./infra/cassandra/init.cql:/init.cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]
    restart: "no"

  # Flexible document store: full prompt/response bodies, rules, API keys and
  # pricing — anything whose shape varies from one request to the next.
  mongodb:
    image: mongo:7
    container_name: llm-tollbooth-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Local SMTP trap for the email alert action (P4): catches outgoing mail and
  # shows it in a web UI instead of really sending it. Dev-only.
  # Mailpit stands in for the unmaintained MailHog — same SMTP (1025) / UI (8025) ports.
  mailpit:
    image: axllent/mailpit:latest
    container_name: llm-tollbooth-mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025" # web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP endpoint the workers send to

  # The tollbooth itself (P3): an OpenAI-compatible proxy. Authenticates the API
  # key, calls a provider (the built-in mock unless a real key is configured),
  # returns the answer, and publishes one llm.events record per call — without
  # ever making the caller wait for that record to land.
  #
  # It needs Mongo (keys, pricing) to serve at all. Kafka is only how it *reports*
  # and Cassandra only how it checks a key's spend against the rollups — with
  # either down it keeps answering calls and says so on /health.
  gateway:
    build: ./gateway
    image: llm-tollbooth/gateway
    container_name: llm-tollbooth-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      PORT: 8080
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: llm.events
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: tollbooth
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_DC: datacenter1
      CASSANDRA_KEYSPACE: tollbooth
      PROJECT_ID: default
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # AUTH_MODE=none => the gateway mints its own API key at boot and prints it.
      # GATEWAY_DEFAULT_KEY pins that key so it survives a restart.
      AUTH_MODE: ${AUTH_MODE:-none}
      GATEWAY_DEFAULT_KEY: ${GATEWAY_DEFAULT_KEY:-}
      # Real providers. A model whose provider has no key here is served by the
      # mock instead — which is why the stack works on a fresh clone, and why
      # switching to the real thing is one line in .env and nothing else.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      # Any OpenAI-compatible server you run yourself (vLLM, Ollama). The URL
      # alone enables it — most want no key.
      SELFHOST_BASE_URL: ${SELFHOST_BASE_URL:-}
      SELFHOST_API_KEY: ${SELFHOST_API_KEY:-}
      PROVIDER_TIMEOUT_MS: ${PROVIDER_TIMEOUT_MS:-60000}
      # Mock provider: the fake LLM that makes the stack demo-able with no real
      # API key. Zero *both* latency knobs to measure the gateway's own overhead —
      # leaving the jitter behind is measuring the jitter.
      MOCK_LATENCY_MS: ${MOCK_LATENCY_MS:-250}
      MOCK_JITTER_MS: ${MOCK_JITTER_MS:-150}
      MOCK_ERROR_RATE: ${MOCK_ERROR_RATE:-0}
      # Response cache. Off by default — caching changes what a call means, so
      # it's the operator's call. Set a TTL in seconds to turn it on.
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-0}
    extra_hosts:
      # So a self-hosted provider running on the host (say vLLM on your laptop)
      # is reachable from in here as host.docker.internal.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # 127.0.0.1, not localhost: inside the container localhost resolves to ::1
      # first, the server binds 0.0.0.0 (v4 only), and busybox wget does not fall
      # back — so the probe fails against a gateway that is answering perfectly.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Ingest worker: consumes llm.events and persists it off the hot path — raw
  # rows + hourly rollups to Cassandra, request documents to MongoDB (P2).
  # Waits for the schema (cassandra-init) before it starts writing.
  ingest:
    build: ./workers/ingest
    image: llm-tollbooth/ingest
    container_name: llm-tollbooth-ingest
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: llm.events
      KAFKA_GROUP_ID: ingest
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_KEYSPACE: tollbooth
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: tollbooth
    restart: unless-stopped

  # Console + read API. Server components read hourly rollups from Cassandra
  # (trends/cards) and request documents from MongoDB (log + detail). P2 ships
  # the Overview and Requests screens.
  dashboard:
    build: ./dashboard
    image: llm-tollbooth/dashboard
    container_name: llm-tollbooth-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_DC: datacenter1
      CASSANDRA_KEYSPACE: tollbooth
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: tollbooth
      PROJECT_ID: default
      # Console login (spec §6). Empty by default => open console; set AUTH_MODE=single
      # plus the three values below in .env to require a login. No code changes.
      AUTH_MODE: ${AUTH_MODE:-none}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    restart: unless-stopped

  # Synthetic traffic generator. Not a long-running service — run on demand:
  #   docker compose run --rm loadgen --rps 50 --duration 10                    # mode 1: load the pipeline
  #   docker compose run --rm loadgen --mode gateway --api-key tb_… --rps 50    # mode 2: load the gateway
  # The "tools" profile keeps it out of a plain `docker compose up`.
  loadgen:
    build: ./loadgen
    image: llm-tollbooth/loadgen
    profiles: ["tools"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      GATEWAY_URL: http://gateway:8080
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}

volumes:
  cassandra_data:
  mongo_data:
